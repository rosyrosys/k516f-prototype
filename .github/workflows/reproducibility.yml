name: reproducibility

# Runs on every push and PR. Verifies two reproducibility claims made
# in the accompanying manuscript:
#   1. |Sigma| = 759,499,667,166,482  exactly
#   2. Monte-Carlo specification entropy reproduces 46.842 bits
#      (closed-form, |Delta| <= 0.01)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify |Sigma|
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          from bars import SIGMA_SIZE
          expected = 11 ** 14 * 2 * 1
          assert SIGMA_SIZE == expected, f"|Sigma| = {SIGMA_SIZE} != {expected}"
          print(f"|Sigma| = {SIGMA_SIZE:,}  OK")
          PY

      - name: Verify entropy (closed-form vs Monte-Carlo)
        run: |
          mkdir -p outputs
          python src/entropy_validation.py --n 200000 --seed 2026 \
              --out-json outputs/entropy_validation.json \
              --out-txt  outputs/entropy_validation.txt
          python - <<'PY'
          import json
          d = json.load(open("outputs/entropy_validation.json"))
          assert d["sigma_size_ok"], "sigma size mismatch"
          assert d["delta_ok"], f"|delta|={d['abs_delta_bits']} > 0.01"
          assert abs(d["H_closed_form_bits"] - 46.842) < 0.01, \
              f"H_closed = {d['H_closed_form_bits']} differs from 46.842"
          print("entropy validation: PASS")
          print(f"  H_closed = {d['H_closed_form_bits']} bits")
          print(f"  H_MC     = {d['H_monte_carlo_bits']} bits")
          print(f"  |delta|  = {d['abs_delta_bits']} bits")
          PY

      - name: Smoke-test generator + synth
        run: |
          python src/generator.py --dist triangular --seed 42 \
              --out outputs/_smoke.mid
          python src/synth.py --dist triangular --seed 42 \
              --out outputs/_smoke.wav
          test -s outputs/_smoke.mid
          test -s outputs/_smoke.wav

      - name: Upload entropy log
        uses: actions/upload-artifact@v4
        with:
          name: entropy-log
          path: |
            outputs/entropy_validation.json
            outputs/entropy_validation.txt
